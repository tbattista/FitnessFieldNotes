<!doctype html>

<html
  lang="en"
  class="layout-menu-fixed layout-compact"
  data-assets-path="/static/assets/"
  data-template="vertical-menu-template-free">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

    <title>Workout Studio - Fitness Field Notes</title>

    <meta name="description" content="Build workouts with a selection-first, MyFitnessPal-style flow." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/assets/img/favicon/favicon.svg" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#C97C5D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap"
      rel="stylesheet" />

    <link rel="stylesheet" href="/static/assets/vendor/fonts/iconify-icons.css" />

    <!-- Core CSS -->
    <link rel="stylesheet" href="/static/assets/vendor/css/core.css" />
    <link rel="stylesheet" href="/static/assets/css/demo.css" />

    <!-- Custom FFN CSS -->
    <link rel="stylesheet" href="/static/assets/css/ffn-custom.css" />
    <link rel="stylesheet" href="/static/assets/css/navbar-custom.css" />
    <link rel="stylesheet" href="/static/assets/css/components.css?v=20260216" />

    <!-- Workout Studio CSS -->
    <link rel="stylesheet" href="/static/assets/css/workout-studio.css?v=20260602-09" />

    <!-- Unified Offcanvas CSS (used by pencil-edit on Page 2 cards) -->
    <link rel="stylesheet" href="/static/assets/css/components/unified-offcanvas.css" />
    <link rel="stylesheet" href="/static/assets/css/components/unified-offcanvas-specialized.css" />
    <link rel="stylesheet" href="/static/assets/css/components/unified-offcanvas-dark.css" />
    <link rel="stylesheet" href="/static/assets/css/components/desktop-offcanvas.css?v=20260217" />

    <!-- Helpers -->
    <script src="/static/assets/vendor/js/helpers.js"></script>
    <script src="/static/assets/js/config.js"></script>

    <!-- Theme Manager (must load early to prevent flash) -->
    <script src="/static/assets/js/services/theme-manager.js"></script>

    <!-- Desktop View Detection (must load early to prevent FOUC) -->
    <script>
      (function() {
        if (window.innerWidth >= 992) document.documentElement.classList.add('desktop-view');
        else document.documentElement.classList.add('mobile-view');
      })();
    </script>

    <!-- FFN Centralized Configuration -->
    <script src="/static/assets/js/app-config.js?v=2.0.3"></script>

    <!-- Firebase SDK Loader -->
    <script type="module" src="/static/assets/js/firebase-loader.js"></script>
  </head>

  <body>
    <!-- Layout wrapper -->
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <!-- Menu -->
        <aside id="layout-menu" class="layout-menu menu-vertical menu bg-menu-theme">
          <!-- Menu will be injected by menu-injection-service.js -->
        </aside>

        <!-- Layout container -->
        <div class="layout-page">
          <div class="content-wrapper">
            <div class="container-xxl flex-grow-1 container-p-y studio-container">

              <!-- Studio shell: slim header + tray + view container -->
              <section class="studio" id="studio" data-view="select">

                <!-- Slim header: workout name input (left) + Plan/Log toggle (right). No back button -->
                <header class="studio-slim-header" id="studioSlimHeader">
                  <div class="studio-slim-name-row">
                    <input
                      type="text"
                      class="studio-slim-name"
                      id="studioWorkoutNameInput"
                      placeholder="Workout name"
                      maxlength="100"
                      autocomplete="off"
                      aria-label="Workout name" />
                    <button
                      type="button"
                      class="studio-meta-toggle"
                      id="studioMetaToggle"
                      aria-controls="studioMetaRow"
                      aria-expanded="false"
                      aria-label="Show tags and description">
                      <i class="bx bx-chevron-down" aria-hidden="true"></i>
                    </button>
                  </div>

                  <div class="studio-meta-row" id="studioMetaRow" hidden>
                    <label class="studio-meta-field" aria-label="Tags">
                      <i class="bx bx-purchase-tag" aria-hidden="true"></i>
                      <input
                        type="text"
                        class="studio-meta-input"
                        id="studioTagsInput"
                        placeholder="Tags (comma-separated)"
                        maxlength="200"
                        autocomplete="off" />
                    </label>
                    <label class="studio-meta-field" aria-label="Description">
                      <i class="bx bx-note" aria-hidden="true"></i>
                      <input
                        type="text"
                        class="studio-meta-input"
                        id="studioDescriptionInput"
                        placeholder="Description"
                        maxlength="500"
                        autocomplete="off" />
                    </label>
                  </div>
                </header>

                <!-- Sticky tray chip row (shared across pages) -->
                <div class="studio-tray" id="studioTray" data-empty="true" aria-label="Selected exercises">
                  <div class="studio-tray-empty" id="studioTrayEmpty">
                    <i class="bx bx-list-plus"></i>
                    <span>Tap <strong>+</strong> on exercises to add them here</span>
                  </div>
                  <div class="studio-tray-chips" id="studioTrayChips" role="list"></div>
                </div>

                <!-- View: Page 1 (Select) -->
                <div class="studio-view studio-view-select" id="studioViewSelect">

                  <!-- Draft restored banner — shown only when a non-trivial draft was loaded -->
                  <div class="studio-draft-banner" id="studioDraftBanner" hidden role="status">
                    <i class="bx bx-time-five studio-draft-banner-icon" aria-hidden="true"></i>
                    <span class="studio-draft-banner-text">
                      Resumed draft from <strong id="studioDraftBannerTime">just now</strong>
                    </span>
                    <button class="studio-draft-banner-action" id="studioDraftBannerStartFresh" type="button">
                      Start fresh
                    </button>
                    <button class="studio-draft-banner-dismiss" id="studioDraftBannerDismiss" type="button" aria-label="Dismiss">
                      <i class="bx bx-x"></i>
                    </button>
                  </div>

                  <!-- Search bar + inline add-custom (button reveals when input has text) -->
                  <div class="studio-search-row">
                    <div class="studio-search">
                      <i class="bx bx-search"></i>
                      <input
                        type="text"
                        id="studioSearchInput"
                        placeholder="Search exercises, equipment, muscle…"
                        autocomplete="off"
                        aria-label="Search exercises" />
                      <button class="studio-search-clear" id="studioSearchClear" type="button" aria-label="Clear search" style="display: none;">
                        <i class="bx bx-x"></i>
                      </button>
                    </div>
                    <button class="studio-add-custom-btn" id="studioAddCustomBtn" type="button" hidden>
                      <i class="bx bx-plus-circle"></i>
                      <span id="studioAddCustomLabel">Add custom</span>
                    </button>
                    <button class="studio-import-btn" id="studioImportBtn" type="button" aria-label="Import workout">
                      <i class="bx bx-import"></i>
                      <span>Import</span>
                    </button>
                  </div>

                  <!-- Section header: title + Filter toggle -->
                  <div class="studio-section-header">
                    <div class="studio-section-header-title">
                      <h6 class="studio-section-title" id="studioSectionTitle">Exercises</h6>
                      <span class="studio-section-count" id="studioListCount" aria-live="polite"></span>
                    </div>
                    <button class="studio-filter-btn" id="studioFilterBtn" type="button" aria-expanded="false" aria-controls="studioFilterPanel">
                      <i class="bx bx-filter"></i>
                      <span>Filter</span>
                      <span class="studio-filter-badge" id="studioFilterBadge" hidden>0</span>
                      <i class="bx bx-chevron-down studio-filter-chevron"></i>
                    </button>
                  </div>

                  <!-- Inline filter panel (toggled by the Filter button) -->
                  <div class="studio-filter-panel" id="studioFilterPanel" hidden>
                    <div class="studio-filter-group">
                      <span class="studio-filter-group-label">Personal</span>
                      <div class="studio-filter-chips" data-group="personal">
                        <button class="studio-filter-chip" type="button" data-value="favorites">
                          <i class="bx bx-star"></i> Favorites
                        </button>
                        <button class="studio-filter-chip" type="button" data-value="recent">
                          <i class="bx bx-history"></i> Recently used
                        </button>
                        <button class="studio-filter-chip" type="button" data-value="custom">
                          <i class="bx bx-user"></i> Custom only
                        </button>
                      </div>
                    </div>
                    <div class="studio-filter-group">
                      <span class="studio-filter-group-label">Type</span>
                      <div class="studio-filter-chips" data-group="type">
                        <button class="studio-filter-chip" type="button" data-value="strength">
                          <i class="bx bx-dumbbell"></i> Strength
                        </button>
                        <button class="studio-filter-chip" type="button" data-value="activities">
                          <i class="bx bx-run"></i> Activities
                        </button>
                      </div>
                    </div>
                    <div class="studio-filter-group">
                      <span class="studio-filter-group-label">Muscle group</span>
                      <div class="studio-filter-chips" data-group="muscleGroup">
                        <button class="studio-filter-chip" type="button" data-value="Chest">Chest</button>
                        <button class="studio-filter-chip" type="button" data-value="Back">Back</button>
                        <button class="studio-filter-chip" type="button" data-value="Shoulders">Shoulders</button>
                        <button class="studio-filter-chip" type="button" data-value="Arms">Arms</button>
                        <button class="studio-filter-chip" type="button" data-value="Legs">Legs</button>
                        <button class="studio-filter-chip" type="button" data-value="Glutes">Glutes</button>
                        <button class="studio-filter-chip" type="button" data-value="Core">Core</button>
                      </div>
                    </div>
                    <div class="studio-filter-group">
                      <span class="studio-filter-group-label">Equipment</span>
                      <div class="studio-filter-chips" data-group="equipment">
                        <button class="studio-filter-chip" type="button" data-value="Barbell">Barbell</button>
                        <button class="studio-filter-chip" type="button" data-value="Dumbbell">Dumbbell</button>
                        <button class="studio-filter-chip" type="button" data-value="Bodyweight">Bodyweight</button>
                        <button class="studio-filter-chip" type="button" data-value="Cable">Cable</button>
                        <button class="studio-filter-chip" type="button" data-value="Kettlebell">Kettlebell</button>
                        <button class="studio-filter-chip" type="button" data-value="Machine">Machine</button>
                      </div>
                    </div>
                    <div class="studio-filter-actions">
                      <button class="studio-filter-clear" id="studioFilterClear" type="button">Clear all</button>
                    </div>
                  </div>

                  <!-- Exercise list -->
                  <div class="studio-list" id="studioList" role="list" aria-live="polite">
                    <!-- Rows injected by exercise-selection-grid.js -->
                  </div>

                  <!-- Empty / loading states -->
                  <div class="studio-empty" id="studioEmpty" style="display: none;">
                    <i class="bx bx-dumbbell"></i>
                    <p id="studioEmptyText">No exercises yet.</p>
                  </div>
                </div>
                <!-- / View: Select -->

                <!-- View: Page 2 (Organize) -->
                <div class="studio-view studio-view-organize" id="studioViewOrganize" hidden>
                  <div class="studio-organize-section-header">
                    <h6 class="studio-section-title">Exercises</h6>
                    <span class="studio-organize-count" id="studioOrganizeCount">0</span>
                    <div class="studio-organize-header-actions">
                      <button class="btn btn-sm btn-outline-secondary studio-reorder-btn"
                              id="studioReorderBtn" type="button" hidden
                              aria-label="Reorder">
                        <i class="bx bx-sort"></i> Reorder
                      </button>
                      <button class="btn btn-sm btn-outline-secondary studio-add-block-btn"
                              id="studioAddBlockBtn" type="button" hidden>
                        <i class="bx bx-collection"></i> Block
                      </button>
                      <button class="btn btn-sm btn-outline-secondary studio-add-note-btn"
                              id="studioAddNoteBtn" type="button" hidden>
                        <i class="bx bx-note"></i> Note
                      </button>
                    </div>
                  </div>

                  <div class="studio-organize-list" id="studioOrganizeList" role="list">
                    <!-- Rows injected by controller from the tray -->
                  </div>

                  <div class="studio-organize-empty" id="studioOrganizeEmpty" hidden>
                    <i class="bx bx-list-ul"></i>
                    <p>No exercises selected yet — go back and add a few.</p>
                  </div>

                  <!-- Back / Save actions live in the floating FAB row now;
                       inline buttons removed. Keep the status div for live
                       Save / Update messages. -->
                  <div class="studio-organize-status" id="studioOrganizeStatus" role="status" aria-live="polite"></div>
                </div>

                <!-- Floating CTA: Continue → Organize -->
                <div class="studio-cta" id="studioContinueCta" hidden>
                  <button class="btn btn-primary studio-cta-btn" id="studioContinueBtn" type="button">
                    Continue → Organize
                    <span class="studio-cta-count" id="studioContinueCount">0</span>
                  </button>
                </div>

                <!-- Floating count pill (appears when the inline count scrolls out of view) -->
                <div class="studio-floating-count" id="studioFloatingCount" hidden aria-live="polite">
                  <i class="bx bx-layer"></i>
                  <span id="studioFloatingCountText"></span>
                </div>

                <!-- Floating FAB row — visible on Page 2 (Organize) only.
                     Mirrors the legacy builder's More / Save / Go affordance
                     so the action surface feels familiar coming from the
                     builder. The Page-2 inline Save button below remains
                     as a desktop-friendly fallback; the FABs are the mobile
                     primary path. -->
                <div class="studio-floating-fabs" id="studioFloatingFabs" hidden>
                  <button type="button" class="studio-fab studio-fab-back" id="studioFabBack" title="Back to selection" aria-label="Back to selection">
                    <i class="bx bx-arrow-back"></i>
                  </button>
                  <button type="button" class="studio-fab studio-fab-more" id="studioFabMore" title="More options" aria-label="More options">
                    <i class="bx bx-dots-vertical-rounded"></i>
                  </button>
                  <button type="button" class="studio-fab studio-fab-save" id="studioFabSave" title="Save workout" aria-label="Save workout">
                    <i class="bx bx-save"></i>
                  </button>
                  <button type="button" class="studio-fab studio-fab-go" id="studioFabGo" title="Start workout" aria-label="Start workout">
                    <i class="bx bx-play"></i>
                  </button>
                </div>

              </section>
              <!-- / Studio shell -->

            </div>
          </div>
        </div>
      </div>
      <div class="layout-overlay layout-menu-toggle"></div>
    </div>

    <!-- Core JS -->
    <script src="/static/assets/vendor/libs/jquery/jquery.js"></script>
    <script src="/static/assets/vendor/libs/popper/popper.js"></script>
    <script src="/static/assets/vendor/js/bootstrap.js"></script>
    <script src="/static/assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
    <script src="/static/assets/vendor/js/menu.js"></script>

    <!-- Templates -->
    <script src="/static/assets/js/components/menu-template.js"></script>
    <script src="/static/assets/js/components/navbar-template.js"></script>
    <script src="/static/assets/js/components/auth-modals-template.js"></script>

    <!-- Injection services -->
    <script src="/static/assets/js/services/menu-injection-service.js?v=20260216"></script>
    <script src="/static/assets/js/services/navbar-injection-service.js"></script>

    <!-- Main JS -->
    <script src="/static/assets/js/main.js?v=20260216"></script>

    <!-- Firebase Services -->
    <script src="/static/assets/js/firebase/firebase-init.js?v=20251020-03"></script>
    <script src="/static/assets/js/firebase/auth-service.js?v=20251020-03"></script>
    <script src="/static/assets/js/firebase/auth-ui.js?v=20251020-03"></script>
    <script src="/static/assets/js/firebase/data-manager-program-ops.js?v=20260228-01"></script>
    <script src="/static/assets/js/firebase/data-manager-workout-ops.js?v=20260228-01"></script>
    <script src="/static/assets/js/firebase/data-manager.js?v=20260228-01"></script>

    <!-- Common Utilities -->
    <script src="/static/assets/js/utils/common-utils.js"></script>

    <!-- Exercise Cache Service (shared singleton) -->
    <script src="/static/assets/js/data/exercise-seed-data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <script src="/static/assets/js/services/exercise-cache-service.js?v=20260226"></script>

    <!-- Activity Type Registry (provides the Activities filter options) -->
    <script src="/static/assets/js/services/activity-type-registry.js"></script>
    <script src="/static/assets/js/services/activity-display-config.js"></script>

    <!-- Field controllers reused on the studio's Page 2 cards (morphing inline editors) -->
    <script src="/static/assets/js/controllers/weight-field-controller.js?v=20260528"></script>
    <script src="/static/assets/js/controllers/repssets-field-controller.js?v=20260528"></script>

    <!-- Unified Offcanvas Factory (pencil edit reuses createExerciseGroupEditor) -->
    <script src="/static/assets/js/components/offcanvas/offcanvas-manager.js?v=20251220-01"></script>
    <script type="module" src="/static/assets/js/components/offcanvas/index.js?v=20260602-09"></script>

    <!-- Workout Studio JS -->
    <!-- Exercise detail popup (reused from exercise-database page) -->
    <script src="/static/assets/js/services/exercise-pairing-service.js?v=20260601-01"></script>
    <script src="/static/assets/js/dashboard/exercise-rendering.js?v=20260601-01"></script>
    <script src="/static/assets/js/components/exercise-detail-offcanvas.js?v=20260601-01"></script>

    <!-- AI Import service (consumed by the offcanvas-import wizard) -->
    <script src="/static/assets/js/services/import-service.js?v=20260216-01"></script>

    <!-- Studio draft persistence -->
    <script src="/static/assets/js/services/studio-draft-service.js?v=20260601-01"></script>

    <script src="/static/assets/js/components/exercise-tray.js?v=20260601-01"></script>
    <script src="/static/assets/js/components/exercise-selection-grid.js?v=20260601-01"></script>
    <script src="/static/assets/js/components/studio-exercise-card.js?v=20260602-06"></script>
    <script src="/static/assets/js/components/studio-block.js?v=20260601-01"></script>
    <script src="/static/assets/js/components/studio-note-card.js?v=20260601-01"></script>
    <script src="/static/assets/js/components/studio-reorder-sheet.js?v=20260601-01"></script>
    <script src="/static/assets/js/controllers/workout-studio-controller.js?v=20260602-09"></script>
  </body>
</html>
